services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/handshake
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    depends_on:
      db:
          condition: service_healthy

# Database service
  db:
    image: ankane/pgvector:latest
    container_name: scout_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=handshake
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d handshake"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
          